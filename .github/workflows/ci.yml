name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# CI never calls live government APIs; CI uses recorded fixtures only (Hard Rule 9).

jobs:
  node:
    name: node (build + typecheck + contract fixtures)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm -r --if-present typecheck
      - run: pnpm -r --if-present lint
      - run: pnpm -r --if-present test

  go:
    name: go (build + vet + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: core/go.sum
      - run: go build ./...
        working-directory: core
      - run: go vet ./...
        working-directory: core
      - run: go test ./...
        working-directory: core

  foundry:
    name: foundry (forge build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - run: forge build
        working-directory: contracts

  python:
    name: python (adapter SDK + contract fixtures)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
        working-directory: py/adapter_sdk
      - run: uv run pytest -q
        working-directory: py/adapter_sdk

  conformance:
    name: conformance (toy adapter, TS + Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: core/go.sum
      - uses: astral-sh/setup-uv@v5
      - run: bash scripts/conformance.sh

  integration:
    name: integration (Postgres + MinIO ingest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fiscal
          POSTGRES_USER: fiscal_owner
          POSTGRES_PASSWORD: change_me_too
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U fiscal_owner -d fiscal"
          --health-interval 5s --health-timeout 5s --health-retries 20
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          MINIO_DEFAULT_BUCKETS: fiscal-raw
        ports:
          - 9000:9000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: core/go.sum
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @outlays/contract build && pnpm --filter @outlays/adapter-sdk build && pnpm --filter @outlays/adapter-toy-fixture build && pnpm --filter @outlays/adapter-us-ca-procurement build && pnpm --filter @outlays/adapter-us-ca-budget build
      - name: wait for minio
        run: until curl -sf http://localhost:9000/minio/health/ready; do sleep 2; done
      # Integration tests reset the schema, so run them serially (-p 1) behind the tag.
      - run: go test -tags integration -p 1 -count=1 -v ./internal/store/ ./internal/ingest/ ./internal/api/ ./internal/classify/ ./internal/engine/
        working-directory: core

  schema-drift:
    name: schema drift guard (codegen regen must be a no-op)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: core/go.sum
      - uses: astral-sh/setup-uv@v5
      - run: pnpm install --frozen-lockfile
      - run: uv sync
        working-directory: py/adapter_sdk
      - run: bash scripts/check-drift.sh
