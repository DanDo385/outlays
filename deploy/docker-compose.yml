# Local dev stack: PostgreSQL 16 + MinIO (S3 API) + one-shot bucket init.
# Usage: docker compose -f deploy/docker-compose.yml up -d
#
# Secrets here are local dev defaults only. Real deployments inject via env (see
# .env.example). Never commit real keys.

name: outlays

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fiscal}
      # Owner role; the app_rw runtime role is created by goose migrations in S4.
      POSTGRES_USER: ${POSTGRES_OWNER_USER:-fiscal_owner}
      POSTGRES_PASSWORD: ${POSTGRES_OWNER_PASSWORD:-change_me_too}
    ports:
      # Host 5433 to avoid colliding with a local Postgres.app on 5432.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_OWNER_USER:-fiscal_owner} -d ${POSTGRES_DB:-fiscal}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the raw bucket then exit.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin}; do echo 'waiting for minio'; sleep 1; done;
      mc mb -p local/${S3_BUCKET:-fiscal-raw};
      mc anonymous set none local/${S3_BUCKET:-fiscal-raw};
      echo 'bucket ready';
      "
    restart: "no"

volumes:
  pgdata:
  miniodata:
