openapi: 3.1.0
info:
  title: Outlays read API
  version: 0.1.0
  description: >
    Read-only public surface (ARCHITECTURE.md Section 5). Every monetary figure is sourced;
    /v1/leads returns only human-published leads. Money is a decimal string, never a float.
  license:
    name: Apache-2.0
servers:
  - url: http://localhost:8080
components:
  schemas:
    Money:
      type: string
      pattern: '^-?\d{1,18}(\.\d{1,4})?$'
      description: Decimal string; never a float.
    Node:
      type: object
      required: [code, label, amount, currency, factCount]
      properties:
        code: { type: string, description: "Scheme code, entity id, or __unclassified__" }
        label: { type: string }
        amount: { $ref: '#/components/schemas/Money' }
        currency: { type: string }
        factCount: { type: integer }
    View:
      type: object
      required: [jurisdiction, fiscalYear, flow, schemeId, total, currency, unmapped, nodes]
      properties:
        jurisdiction: { type: string }
        fiscalYear: { type: string }
        flow: { type: string, enum: [spending, revenue] }
        schemeId: { type: string }
        total: { $ref: '#/components/schemas/Money' }
        currency: { type: string }
        unmapped:
          $ref: '#/components/schemas/Money'
          description: Total of facts with no assignment in the requested scheme (also the __unclassified__ node).
        nodes:
          type: array
          items: { $ref: '#/components/schemas/Node' }
    Provenance:
      type: object
      required: [factId, factHash, derivationQuery]
      properties:
        factId: { type: string, format: uuid }
        factHash: { type: string }
        derivationQuery: { type: string }
        rawSha256: { type: [string, 'null'] }
        storageKey: { type: [string, 'null'], description: Object-storage key for the raw snapshot bytes. }
        snapshotUrl: { type: [string, 'null'] }
        httpStatus: { type: [integer, 'null'] }
        bytes: { type: [integer, 'null'] }
    Coverage:
      type: object
      required: [jurisdiction, fiscalYear, numerator, numeratorBasis, denominator, denominatorBasis, ratio, currency]
      properties:
        jurisdiction: { type: string }
        fiscalYear: { type: string }
        numerator:
          $ref: '#/components/schemas/Money'
          description: Sum of current transaction+award grain facts.
        numeratorBasis:
          type: object
          description: Provenance of the numerator — the aggregation performed and the facts listing where each fact links to its own provenance.
          required: [derivationQuery, factsUrl]
          properties:
            derivationQuery: { type: string }
            factsUrl: { type: string }
        denominator:
          oneOf: [{ $ref: '#/components/schemas/Money' }, { type: 'null' }]
          description: Official control total; null until one is ingested.
        denominatorBasis:
          type: [object, 'null']
          description: Provenance of the denominator — the control total's scope label and raw-snapshot pointer.
          required: [scope, derivationQuery, rawSha256]
          properties:
            scope: { type: string, description: "What coverage against this total means, e.g. 'procurement facts vs total budget' — names any scope mismatch." }
            derivationQuery: { type: string }
            rawSha256: { type: string }
            storageKey: { type: [string, 'null'] }
            snapshotUrl: { type: [string, 'null'] }
        ratio: { type: [string, 'null'], description: numerator/denominator rounded to 6 places; null without a denominator. }
        currency: { type: string }
    Error:
      type: object
      properties:
        error: { type: string }
paths:
  /v1/healthz:
    get:
      summary: Liveness + DB ping
      responses:
        '200': { description: ok }
        '503': { description: db unavailable }
  /v1/jurisdictions:
    get:
      summary: List jurisdictions present in the warehouse
      responses:
        '200': { description: ok }
  /v1/{jur}/years:
    get:
      summary: List fiscal years for a jurisdiction (descending)
      parameters:
        - { name: jur, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: ok }
  /v1/{jur}/{year}/view:
    get:
      summary: One-level rollup over a scheme (or the payee tree)
      description: >
        Groups current (non-superseded) facts by their assignment in `scheme`. Facts with no
        assignment in that scheme are returned in an explicit `__unclassified__` node and in
        `unmapped` — never dropped. `scheme=payee` groups by payee entity.
      parameters:
        - { name: jur, in: path, required: true, schema: { type: string } }
        - { name: year, in: path, required: true, schema: { type: string, pattern: '^\d{4}(-\d{2})?$' } }
        - { name: scheme, in: query, required: true, schema: { type: string }, description: "scheme_id or 'payee'" }
        - { name: flow, in: query, required: false, schema: { type: string, enum: [spending, revenue], default: spending } }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/View' }
        '400':
          description: invalid scheme/flow/year
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
  /v1/{jur}/{year}/coverage:
    get:
      summary: Coverage = sum(transaction+award facts) / official control total
      description: >
        Numerator and denominator each carry provenance. The denominator's `scope` labels
        what the comparison means (e.g. "procurement facts vs total budget") so a scope
        mismatch between ingested facts and the official total is always stated explicitly.
      parameters:
        - { name: jur, in: path, required: true, schema: { type: string } }
        - { name: year, in: path, required: true, schema: { type: string, pattern: '^\d{4}(-\d{2})?$' } }
      responses:
        '200':
          description: numerator always present; denominator/denominatorBasis/ratio null until a control_total is ingested
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Coverage' }
  /v1/entities:
    get:
      summary: Search entities by canonical-name substring
      parameters:
        - { name: q, in: query, required: true, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 50, maximum: 200 } }
      responses:
        '200': { description: ok }
  /v1/entities/{id}/flows:
    get:
      summary: One entity's spending broken down by department (vendor across departments)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: year, in: query, required: true, schema: { type: string, pattern: '^\d{4}(-\d{2})?$' } }
      responses:
        '200': { description: ok }
        '404': { description: entity not found }
  /v1/facts:
    get:
      summary: Paged fact listing (largest amount first)
      description: >
        Optionally filtered to one view node via `scheme` + `code` (must be given together,
        mirroring the view endpoint): `code=__unclassified__` selects facts with no assignment
        in that scheme; `scheme=payee` selects by payee entity (`code` = entity id, or
        `__unclassified__` for facts with no payee). This is the drill-down behind the UI.
      parameters:
        - { name: jurisdiction, in: query, schema: { type: string } }
        - { name: year, in: query, schema: { type: string, pattern: '^\d{4}(-\d{2})?$' } }
        - { name: flow, in: query, schema: { type: string, enum: [spending, revenue] } }
        - { name: payee, in: query, schema: { type: string, format: uuid } }
        - { name: scheme, in: query, schema: { type: string }, description: "scheme_id or 'payee'; requires code" }
        - { name: code, in: query, schema: { type: string }, description: "node code, entity id, or __unclassified__; requires scheme" }
        - { name: limit, in: query, schema: { type: integer, default: 100, maximum: 1000 } }
        - { name: offset, in: query, schema: { type: integer, default: 0 } }
      responses:
        '200': { description: ok }
        '400': { description: invalid year/flow/payee or mismatched scheme+code }
  /v1/fact/{id}/provenance:
    get:
      summary: Raw-snapshot pointer + hashes + derivation query for a fact
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Provenance' }
        '404': { description: fact not found }
  /v1/compare:
    get:
      summary: Total a (scheme, code) across jurisdictions
      parameters:
        - { name: scheme, in: query, required: true, schema: { type: string } }
        - { name: code, in: query, required: true, schema: { type: string } }
        - { name: jurisdictions, in: query, required: true, schema: { type: string }, description: comma-separated }
      responses:
        '200': { description: ok }
  /v1/leads:
    get:
      summary: Published leads only (never any other status)
      description: >
        A lead is facts plus statistical context, never an accusation. Only leads whose
        latest append-only review event is 'published' (set by a human reviewer) appear
        here; drafts are invisible. Each lead carries its rule citation (anchored in
        docs/leads-methodology.md), limitations text, and fact links resolvable via
        /v1/fact/{id}/provenance.
      parameters:
        - { name: status, in: query, required: false, schema: { type: string, enum: [published] } }
      responses:
        '200':
          description: published leads
          content:
            application/json:
              schema:
                type: object
                required: [status, leads]
                properties:
                  status: { type: string, enum: [published] }
                  leads:
                    type: array
                    items:
                      type: object
                      required: [leadId, ruleId, title, summary, severity, citation,
                                 limitations, factIds, generatedQuery, reviewer, publishedAt]
                      properties:
                        leadId: { type: string, format: uuid }
                        ruleId: { type: string }
                        title: { type: string }
                        summary: { type: string }
                        severity: { type: string, enum: [info, low, medium] }
                        citation:
                          type: array
                          items: { type: string }
                          description: first entry anchors into docs/leads-methodology.md
                        limitations: { type: string }
                        factIds:
                          type: array
                          items: { type: string, format: uuid }
                        score:
                          type: [string, 'null']
                          description: rule-defined statistic (e.g. vendor share ratio), decimal string
                        generatedQuery: { type: string }
                        reviewer: { type: string }
                        reviewNote: { type: [string, 'null'] }
                        publishedAt: { type: string }
        '400': { description: a non-published status was requested }
